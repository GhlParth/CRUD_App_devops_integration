services:

  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    volumes:
      - mongo-data:/data/db

  backend:
    # build: ./backend
    # container_name: backend
    # restart: always
    # depends_on:
    #   - mongo
    # environment:
    #   - MONGO_URL=mongodb://mongo:27017/dd_db
    image: parthghl00/backend:latest
    expose:
      - "8080"

  frontend:
    # build: ./frontend
    # container_name: frontend
    # restart: always
    # depends_on:
    #   - backend
    image: parthghl00/frontend:latest
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"   # expose to host
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongo-data: